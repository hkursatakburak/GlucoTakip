{% extends "base.html" %}

{% block nav %}{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <i class="fa-solid fa-lock text-blue-500 text-5xl mb-4"></i>
        <h2 class="text-3xl font-bold tracking-tight text-slate-900">{{ _('reset_pwd.title') }}</h2>
        <p class="mt-2 text-sm text-slate-600">
            {{ _('reset_pwd.desc') }}
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="glass-panel py-8 px-4 sm:px-10 rounded-2xl">
            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-6 rounded-md">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fa-solid fa-circle-exclamation text-red-400"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700">{{ error }}</p>
                    </div>
                </div>
            </div>
            {% endif %}

            <form class="space-y-6" action="/auth/reset-password" method="POST">
                <input type="hidden" name="token" value="{{ token }}">

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">{{ _('reset_pwd.pwd_label')
                        }}</label>
                    <div class="mt-1 relative rounded-xl shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required
                            class="block w-full appearance-none rounded-xl border border-slate-300 pl-11 pr-4 py-3 placeholder-slate-400 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm text-lg transition-colors">
                    </div>
                </div>

                <div>
                    <label for="password_confirm" class="block text-sm font-medium text-slate-700">{{
                        _('reset_pwd.pwd_confirm_label') }}</label>
                    <div class="mt-1 relative rounded-xl shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        <input id="password_confirm" name="password_confirm" type="password" required
                            class="block w-full appearance-none rounded-xl border border-slate-300 pl-11 pr-4 py-3 placeholder-slate-400 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm text-lg transition-colors">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="flex w-full justify-center rounded-xl border border-transparent bg-blue-600 py-3 px-4 text-sm font-medium text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all transform active:scale-95 text-lg">
                        {{ _('reset_pwd.submit_btn') }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
