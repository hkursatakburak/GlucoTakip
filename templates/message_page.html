{% extends "base.html" %}

{% block nav %}{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <!-- Optional Icon representation based on title text -->
        {% if "Hata" in title or "Geçersiz" in title %}
        <i class="fa-solid fa-circle-xmark text-red-500 text-5xl mb-4"></i>
        {% elif "Gönderildi" in title %}
        <i class="fa-solid fa-envelope-circle-check text-blue-500 text-5xl mb-4"></i>
        {% else %}
        <i class="fa-solid fa-circle-check text-green-500 text-5xl mb-4"></i>
        {% endif %}

        <h2 class="text-3xl font-bold tracking-tight text-slate-900">{{ title }}</h2>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="glass-panel py-8 px-4 sm:px-10 rounded-2xl text-center">

            <p class="text-slate-600 text-lg mb-8">
                {{ message }}
            </p>

            <a href="/login"
                class="inline-flex w-full justify-center rounded-xl border border-transparent bg-blue-600 py-3 px-4 text-sm font-medium text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all transform active:scale-95 text-lg">
                {{ _('message_page.back_to_login') }}
            </a>

        </div>
    </div>
</div>
{% endblock %}
