{% extends "base.html" %}

{% block nav %}{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <i class="fa-solid fa-key text-blue-500 text-5xl mb-4"></i>
        <h2 class="text-3xl font-bold tracking-tight text-slate-900">Şifremi Unuttum</h2>
        <p class="mt-2 text-sm text-slate-600">
            E-posta adresinizi girin, size şifre sıfırlama bağlantısı gönderelim.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="glass-panel py-8 px-4 sm:px-10 rounded-2xl">
            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-6 rounded-md">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fa-solid fa-circle-exclamation text-red-400"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-red-700">{{ error }}</p>
                    </div>
                </div>
            </div>
            {% endif %}

            {% if warning %}
            <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6 rounded-md">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fa-solid fa-triangle-exclamation text-amber-400"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-amber-700">{{ warning }}</p>
                    </div>
                </div>
            </div>
            {% endif %}

            <form class="space-y-6" action="/auth/forgot-password" method="POST">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700">E-posta Adresi</label>
                    <div class="mt-1 relative rounded-xl shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <i class="fa-solid fa-envelope text-slate-400"></i>
                        </div>
                        <input id="email" name="email" type="email" required placeholder="ornek@email.com"
                            class="block w-full appearance-none rounded-xl border border-slate-300 pl-11 pr-4 py-3 placeholder-slate-400 focus:border-blue-500 focus:outline-none focus:ring-blue-500 sm:text-sm text-lg transition-colors">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="flex w-full justify-center rounded-xl border border-transparent bg-blue-600 py-3 px-4 text-sm font-medium text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all transform active:scale-95 text-lg">
                        Şifre Sıfırlama Linki Gönder
                    </button>
                </div>

                <div class="mt-6 text-center">
                    <a href="/login" class="font-medium text-blue-600 hover:text-blue-500 transition-colors text-sm">
                        Giriş sayfasına dön
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
